spring:
  application:
    name: ToDoListAPI

  datasource:
    url: jdbc:mysql://localhost:3306/todolist?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: user
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: your-very-long-secret-key-for-hmac-signing
  expiration: 3600000
